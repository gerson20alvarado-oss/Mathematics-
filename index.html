<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matemáticas Simplificadas</title>
<meta name="description" content="Plataforma interactiva de estudio basada en Matemáticas Simplificadas (2.ª edición, CONAMAT/Pearson).">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="vendor/katex/katex.min.css">
<script defer src="vendor/katex/katex.min.js"></script>
<script defer src="vendor/katex/contrib/auto-render.min.js"></script>
</head>
<body>
<div class="cuaderno-fondo"></div>

<header class="topbar">
  <a class="marca" href="#/">
    <span class="marca-icono">∑</span>
    <span class="marca-texto">Matemáticas <strong>Simplificadas</strong></span>
  </a>

  <div class="topbar-derecha">
    <div class="progreso-mini" title="Progreso total del libro">
      <div class="progreso-mini-barra">
        <div class="progreso-mini-relleno" id="progreso-libro-barra" style="width:0%"></div>
      </div>
      <span id="progreso-libro-texto">0%</span>
    </div>
    <button id="toggle-tema" class="btn-icono" aria-label="Cambiar modo claro/oscuro" title="Modo claro / oscuro">
      <span class="icono-sol"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em" aria-hidden="true"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4" y1="12" x2="2" y2="12"/><line x1="22" y1="12" x2="20" y2="12"/><line x1="5" y1="5" x2="6.5" y2="6.5"/><line x1="17.5" y1="17.5" x2="19" y2="19"/><line x1="5" y1="19" x2="6.5" y2="17.5"/><line x1="17.5" y1="6.5" x2="19" y2="5"/></svg></span><span class="icono-luna"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em" aria-hidden="true"><path d="M21 12.5A9 9 0 1 1 11.5 3a7 7 0 0 0 9.5 9.5Z"/></svg></span>
    </button>
    <span id="indicador-sync" class="indicador-sync" hidden></span>
    <button id="boton-cuenta" class="btn-icono" aria-label="Iniciar sesión con GitHub para sincronizar tu progreso" title="Cuenta" hidden>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em" aria-hidden="true"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    </button>
  </div>
</header>

<main class="contenedor" id="app" aria-live="polite">
  <p class="cargando">Cargando…</p>
</main>

<footer class="pie">
  <p>Basado exclusivamente en <em>Matemáticas Simplificadas</em>, 2.ª edición — CONAMAT / Pearson.
  Teoría y ejercicios: pág. 1–1440 · Respuestas oficiales: pág. 1441–1602.</p>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
